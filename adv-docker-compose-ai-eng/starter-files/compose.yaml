services:
  app:
    build: .
    container_name: optimizer
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      POSTGRES_DB: optimized_prompts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: optimizer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optimized_prompts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: